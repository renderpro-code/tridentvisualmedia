# -------------------------------------------------------
# Trident Visual Media — Decap CMS Config
# Replace YOURUSERNAME with your GitHub username
# -------------------------------------------------------

backend:
  name: github
  repo: YOURUSERNAME/tridentvisualmedia
  branch: main

media_folder: static/images
public_folder: /images

# -------------------------------------------------------
# Collections
# -------------------------------------------------------
collections:

  # --- Books ---
  - name: "books"
    label: "Books"
    label_singular: "Book"
    folder: "content/series"
    create: true
    nested:
      depth: 2
    filter:
      field: draft
      value: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Series", name: "series", widget: "select",
          options: ["miller-crime-thriller", "echoes-of-the-void"] }
      - { label: "Series Order", name: "seriesOrder", widget: "number", default: 1 }
      - { label: "Publication Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Back Cover Blurb", name: "description", widget: "text" }
      - { label: "Amazon URL", name: "amazon_url", widget: "string", required: false }
      - { label: "Goodreads URL", name: "goodreads_url", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # --- Blog Posts ---
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description (SEO)", name: "description", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # --- Pages (About, Newsletter) ---
  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Newsletter"
        name: "newsletter"
        file: "content/newsletter/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }
