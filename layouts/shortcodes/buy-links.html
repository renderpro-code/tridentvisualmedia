<div class="buy-links">
  {{ with .Get "amazon" }}
  <a href="{{ . }}" target="_blank" rel="noopener" class="buy-btn amazon">
    Buy Kindle Edition
  </a>
  {{ end }}
  {{ with .Get "print" }}
  <a href="{{ . }}" target="_blank" rel="noopener" class="buy-btn print">
    Buy Print Edition
  </a>
  {{ end }}
  {{ with .Get "goodreads" }}
  <a href="{{ . }}" target="_blank" rel="noopener" class="buy-btn goodreads">
    View on Goodreads
  </a>
  {{ end }}
</div>
