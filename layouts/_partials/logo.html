{{- if .Site.Params.header.logo }}
  {{- $logo := resources.Get .Site.Params.header.logo }}
  {{- if $logo }}
  <a href="{{ .Site.BaseURL }}">
    <img
      src="{{ $logo.Permalink }}"
      style="height:120px;width:auto;mix-blend-mode:lighten;"
      alt="{{ .Site.Title }}"
    />
  </a>
  {{- end }}
{{- else }}
  <a href="{{ .Site.BaseURL }}">
    <span class="text-xl font-semibold">{{ .Site.Title }}</span>
  </a>
{{- end }}
