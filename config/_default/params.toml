colorScheme = "slate"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true

[header]
  logo = "trident-logo.png"
  logoDark = "trident-logo.png"

[homepage]
  layout = "hero"
  showRecent = true
  recentLimit = 3

[article]
  showBreadcrumbs = true
  showDate = true
  showDateUpdated = false
  showWordCount = false
  showReadingTime = false
  showTableOfContents = false
  showRelatedContent = true

[list]
  showBreadcrumbs = true
  groupByYear = false

[author]
  name = "Trident Visual Media"
  image = "trident-logo.png"
  headline = "Crime Thrillers & Science Fiction"
  bio = "Trident Visual Media publishes gripping crime thrillers and boundary-pushing science fiction. Home of the Miller Crime Thriller series and the Echoes of the Void series."
